name: Release

# Triggers on tags like v1.0.0 and v1.0.0-beta
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: rustyochestrator

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true

          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            cross: true

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            binary_suffix: .exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar.gz, Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BINARY=target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}
          ARCHIVE=${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          chmod +x "$BINARY"
          tar -czf "$ARCHIVE" -C "$(dirname "$BINARY")" "$(basename "$BINARY")"
          echo "ASSET=$ARCHIVE" >> "$GITHUB_ENV"
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Package (zip, Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $binary = "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe"
          $archive = "${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path $binary -DestinationPath $archive
          echo "ASSET=$archive" | Out-File -Append $env:GITHUB_ENV
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ASCII "$archive.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # 🔥 Generate changelog
      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s" > CHANGELOG_GEN.md
          else
            git log $PREV_TAG..HEAD --pretty=format:"- %s" > CHANGELOG_GEN.md
          fi

      # 🔥 Generate install.sh
      - name: Generate install script
        run: |
          cat << 'EOF' > install.sh
          #!/usr/bin/env bash
          set -e

          REPO="${{ github.repository }}"
          BINARY="rustyochestrator"

          OS="$(uname -s)"
          ARCH="$(uname -m)"

          case "$OS" in
            Darwin) OS="apple-darwin" ;;
            Linux) OS="unknown-linux-gnu" ;;
            *) echo "Unsupported OS: $OS"; exit 1 ;;
          esac

          case "$ARCH" in
            x86_64) ARCH="x86_64" ;;
            arm64|aarch64) ARCH="aarch64" ;;
            *) echo "Unsupported ARCH: $ARCH"; exit 1 ;;
          esac

          TARGET="$ARCH-$OS"

          VERSION="${{ github.ref_name }}"
          ARCHIVE="$BINARY-$VERSION-$TARGET.tar.gz"
          URL="https://github.com/$REPO/releases/download/$VERSION/$ARCHIVE"

          echo "Installing $BINARY $VERSION for $TARGET..."

          curl -L "$URL" -o "$ARCHIVE"
          tar -xzf "$ARCHIVE"

          chmod +x "$BINARY"
          sudo mv "$BINARY" /usr/local/bin/

          echo "✅ Installed!"
          EOF

          chmod +x install.sh

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate combined checksums file
        run: |
          cat artifacts/*.sha256 > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "rustyochestrator ${{ github.ref_name }}"
          body_path: CHANGELOG_GEN.md
          files: |
            artifacts/*
            checksums.txt
            install.sh
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish-crate:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Validate version matches tag
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -n1 | cut -d '"' -f2)

          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Version mismatch"
            exit 1
          fi

      - name: Check token
        run: |
          if [ -z "${{ secrets.CARGO_REGISTRY_TOKEN }}" ]; then
            echo "Missing token"
            exit 1
          fi

      - name: Dry run
        run: cargo publish --dry-run

      - name: Publish
        if: "!contains(github.ref_name, '-')"
        run: cargo publish --locked --token $CARGO_REGISTRY_TOKEN || echo "Already published"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}