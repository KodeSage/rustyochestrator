name: Release

# Triggers on any tag like v0.1.0, v1.2.3, etc.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: rustyochestrator

jobs:
  # ── Build native binaries for every target ──────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

          # macOS — Intel
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz

          # Linux — x86_64 (glibc, works on Ubuntu 20.04+)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz

          # Linux — ARM64 (Raspberry Pi 4, AWS Graviton, etc.)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true          # uses cross-rs for cross-compilation

          # Linux — musl (fully static, no libc dependency)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            cross: true

          # Windows — x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            binary_suffix: .exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation targets)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # ── Compile ──────────────────────────────────────────────────────────────
      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package ──────────────────────────────────────────────────────────────
      - name: Package (tar.gz, Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BINARY=target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}
          ARCHIVE=${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          chmod +x "$BINARY"
          tar -czf "$ARCHIVE" -C "$(dirname "$BINARY")" "$(basename "$BINARY")"
          echo "ASSET=$ARCHIVE" >> "$GITHUB_ENV"
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Package (zip, Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $binary = "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe"
          $archive = "${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path $binary -DestinationPath $archive
          echo "ASSET=$archive" | Out-File -Append $env:GITHUB_ENV
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ASCII "$archive.sha256"

      # ── Upload artifact for the release job ──────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

  # ── Create the GitHub Release and attach all binaries ───────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate combined checksums file
        run: |
          cat artifacts/*.sha256 > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "rustyochestrator ${{ github.ref_name }}"
          body: |
            ## rustyochestrator ${{ github.ref_name }}

            ### Install

            **Cargo (recommended for Rust users):**
            ```bash
            cargo install rustyochestrator
            ```

            **macOS / Linux — one-liner:**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/install.sh | sh
            ```

            **Direct download:**
            Pick the archive for your platform below, then:
            ```bash
            tar xzf rustyochestrator-*.tar.gz
            sudo mv rustyochestrator /usr/local/bin/
            ```

            ### Checksums
            Verify your download against `checksums.txt`.

            ### What's changed
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) or compare at
            https://github.com/${{ github.repository }}/compare/...
          files: |
            artifacts/*
            checksums.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # v1.0.0-beta → pre-release

  # ── Publish to crates.io ─────────────────────────────────────────────────────
  publish-crate:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
