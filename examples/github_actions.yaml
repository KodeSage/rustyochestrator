# GitHub Actions workflow – also parseable by rustyochestrator directly.
# Run locally: cargo run -- run examples/github_actions.yaml

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  build:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Build debug
        run: cargo build

      - name: Build release
        run: cargo build --release

  test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Unit tests
        run: cargo test --all

      - name: Smoke test pipeline runner
        run: cargo run -- run examples/pipeline.yaml
